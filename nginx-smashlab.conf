upstream smashlab_upstream {
    server 127.0.0.1:3006;
    keepalive 64;
}

server {
    listen 80;
    server_name smashlab.vacabc.my;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    client_max_body_size 10M;

    access_log /var/log/nginx/smashlab-access.log;
    error_log /var/log/nginx/smashlab-error.log;

    # Static assets - long cache
    location /_next/static/ {
        alias /var/www/smashlab/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Player images
    location /players/ {
        alias /var/www/smashlab/public/players/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API routes - no cache
    location /api/ {
        proxy_pass http://smashlab_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # All other routes
    location / {
        proxy_pass http://smashlab_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
